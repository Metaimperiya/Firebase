<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENGINE: FIREBASE LIVE LOGS</title>
    <style>
        body {
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ШАПКА */
        header {
            width: 100%;
            background: #fff;
            padding: 20px 0;
            text-align: center;
            border-bottom: 1px solid #ddd;
        }

        header h1 {
            margin: 0;
            font-family: monospace;
            font-size: 22px;
            letter-spacing: 2px;
        }

        .sub {
            font-size: 11px;
            color: #888;
            text-transform: uppercase;
            margin-top: 5px;
        }

        /* МЕНЮ */
        nav {
            width: 100%;
            background: #fff;
            border-bottom: 2px solid #000;
            padding: 10px 0;
        }

        nav ul {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        nav ul li a {
            text-decoration: none;
            color: #000;
            font-weight: bold;
            font-size: 13px;
            text-transform: uppercase;
        }

        /* ОКНО СООБЩЕНИЙ */
        .display-window {
            width: 90%;
            max-width: 600px;
            height: 450px;
            background: #fff;
            margin-top: 20px;
            border-radius: 12px 12px 0 0;
            border: 1px solid #ddd;
            border-bottom: none;
            overflow-y: auto;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .log-item {
            background: #f9f9f9;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #eee;
            font-size: 14px;
            position: relative;
        }

        /* Сдвиг для ответов */
        .is-reply {
            margin-left: 30px;
            border-left: 3px solid #000;
            background: #f1f1f1;
        }

        .log-user { font-weight: bold; color: #333; }
        .log-time { font-size: 10px; color: #aaa; float: right; }
        
        .reply-btn {
            background: none;
            border: none;
            color: #007bff;
            font-size: 11px;
            cursor: pointer;
            padding: 0;
            margin-top: 5px;
            text-transform: uppercase;
            font-weight: bold;
        }

        /* ПАНЕЛЬ ВВОДА */
        .input-box {
            width: 90%;
            max-width: 600px;
            background: #fff;
            padding: 20px;
            border-radius: 0 0 12px 12px;
            border: 1px solid #ddd;
            box-sizing: border-box;
        }

        .input-field {
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
        }

        /* Индикатор того, кому отвечаем */
        #reply-info {
            display: none;
            background: #eee;
            padding: 5px 10px;
            font-size: 12px;
            margin-bottom: 10px;
            border-radius: 4px;
            border-left: 4px solid #000;
        }

        .send-btn {
            width: 100%;
            padding: 15px;
            background: #000;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <header>
        <h1>ENGINE: FIREBASE CONSOLE</h1>
        <div class="sub">Project: metaimperiya-14d1b | Live Connection</div>
    </header>

    <nav>
        <ul>
            <li><a href="#">Главная</a></li>
            <li><a href="#">Студия</a></li>
            <li><a href="#">3D Модели</a></li>
            <li><a href="#">Коннект</a></li>
        </ul>
    </nav>

    <div class="display-window" id="screen">
        <div style="color: #ccc; text-align: center; margin-top: 150px;">Ожидание данных...</div>
    </div>

    <div class="input-box">
        <div id="reply-info">
            Ответ для: <b id="reply-to-user"></b> 
            <span onclick="cancelReply()" style="color:red; cursor:pointer; float:right;">[ОТМЕНА]</span>
        </div>
        <input type="text" id="nick" class="input-field" placeholder="Твой ник...">
        <input type="text" id="message" class="input-field" placeholder="Сообщение...">
        <button onclick="push()" class="send-btn">ОТПРАВИТЬ В БАЗУ</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC5L2GQ-2CYj-GNYsHENASdvKVF68rsEb0",
            authDomain: "metaimperiya-14d1b.firebaseapp.com",
            databaseURL: "https://metaimperiya-14d1b-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "metaimperiya-14d1b",
            storageBucket: "metaimperiya-14d1b.firebasestorage.app",
            messagingSenderId: "415206276902",
            appId: "1:415206276902:web:1e38287b922191eac00be7"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentReplyId = null; // ID родительского сообщения

        function setReply(id, user) {
            currentReplyId = id;
            document.getElementById('reply-info').style.display = 'block';
            document.getElementById('reply-to-user').innerText = user;
            document.getElementById('message').focus();
        }

        function cancelReply() {
            currentReplyId = null;
            document.getElementById('reply-info').style.display = 'none';
        }

        function push() {
            const u = document.getElementById('nick').value || 'User';
            const m = document.getElementById('message').value;
            if(m.trim() !== "") {
                db.ref('chat_logs').push().set({
                    user: u,
                    text: m,
                    time: new Date().toLocaleTimeString(),
                    parentId: currentReplyId // Сохраняем связь
                });
                document.getElementById('message').value = '';
                cancelReply();
            }
        }

        db.ref('chat_logs').on('value', (snapshot) => {
            const screen = document.getElementById('screen');
            screen.innerHTML = '';
            
            const allMsgs = [];
            snapshot.forEach(child => {
                allMsgs.push({ id: child.key, ...child.val() });
            });

            // Сначала выводим основные сообщения, потом ответы под ними
            allMsgs.filter(m => !m.parentId).forEach(parent => {
                renderMsg(parent, false);
                allMsgs.filter(m => m.parentId === parent.id).forEach(reply => {
                    renderMsg(reply, true);
                });
            });

            screen.scrollTop = screen.scrollHeight;
        });

        function renderMsg(data, isReply) {
            const screen = document.getElementById('screen');
            const replyClass = isReply ? 'is-reply' : '';
            screen.innerHTML += `
                <div class="log-item ${replyClass}">
                    <span class="log-user">${data.user}</span>
                    <span class="log-time">${data.time}</span>
                    <div style="margin-top:5px;">${data.text}</div>
                    ${!isReply ? `<button class="reply-btn" onclick="setReply('${data.id}', '${data.user}')">Ответить</button>` : ''}
                </div>
            `;
        }
    </script>

</body>
</html>
